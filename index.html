<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/styles.css">
    <title>Robin. W</title>
</head>
<body>
    <div class="background-rectangle"></div>
    <header class="header">
        <a href="/" class="header-logo">
            <img class="header-logo-img" src="./img/logo.svg" alt="Robin.W logo" width="78px" height="24px" loading="lazy">
        </a>
        <button class="header-burger-menu" id="header-burger-menu">
            <span class="burger-menu-elem1"></span>
            <span class="burger-menu-elem2"></span>
        </button>
        <nav class="header-menu" id="header-menu">
            <ul class="header-menu-list">
                <li class="header-menu-item">
                    <a href="#experience" class="header-menu-link">
                        Experience
                    </a>
                </li>
                <li class="header-menu-item">
                    <a href="#work" class="header-menu-link">
                        Work
                    </a>
                </li>
                <li class="header-menu-item">
                    <a href="#photography" class="header-menu-link">
                        Photography
                    </a>
                </li>
                <li class="header-menu-item">
                    <a href="#contact" class="header-menu-link primary">
                        Contact
                    </a>
                </li>
            </ul>
        </nav>
    </header>
    <main class="content">
        <section class="hero-section container">
            <div class="hero-container">
                <picture>
                    <source media="(max-width: 700px)" srcset="./img/hero_360.png" class="hero-img">
                    <source media="(max-width: 1199px)" srcset="./img/hero_768.png" class="hero-img">
                    <source media="(min-width: 1200px)" srcset="./img/hero_1440.png" class="hero-img">
                    <img src="./img/hero_1440.png" alt="Hero img" class="hero-img">
                </picture>
                <div class="hero-text">
                    <h1 class="hero-title">
                        I’m Robin Williams. A Product Designer 
                        <span class="text-dark-grey">based in Italy.</span>
                    </h1>
                    <p class="hero-description">
                        I’m probably the most passionate designer you will ever get to work with. If you have
                        a great project that needs some amazing skills, I’m your guy.
                    </p>
                </div>
            </div>
        </section>
        <section class="expirinece-section container">

        </section>
    </main>
</body>
</html>
